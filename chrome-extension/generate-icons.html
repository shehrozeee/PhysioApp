<!-- Open this file in Chrome, right-click each image and "Save image as" icon-48.png and icon-128.png -->
<html><body style="background:#fff;padding:40px">
<h3>Right-click each → Save image as → icon-48.png / icon-128.png</h3>
<p>48px:</p>
<canvas id="c48" width="48" height="48"></canvas>
<p>128px:</p>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function draw(ctx, size) {
  const s = size / 32;
  ctx.fillStyle = '#4f46e5';
  roundRect(ctx, 0, 0, size, size, 6 * s);
  ctx.fill();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 2 * s;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(6*s, 8*s);
  ctx.lineTo(14*s, 8*s);
  ctx.quadraticCurveTo(18*s, 8*s, 18*s, 12*s);
  ctx.lineTo(18*s, 26*s);
  ctx.quadraticCurveTo(15*s, 23*s, 12*s, 23*s);
  ctx.lineTo(6*s, 23*s);
  ctx.closePath();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(26*s, 8*s);
  ctx.lineTo(18*s, 8*s);
  ctx.quadraticCurveTo(14*s, 8*s, 14*s, 12*s);
  ctx.lineTo(14*s, 26*s);
  ctx.quadraticCurveTo(17*s, 23*s, 20*s, 23*s);
  ctx.lineTo(26*s, 23*s);
  ctx.closePath();
  ctx.stroke();
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
draw(document.getElementById('c48').getContext('2d'), 48);
draw(document.getElementById('c128').getContext('2d'), 128);
</script></body></html>
