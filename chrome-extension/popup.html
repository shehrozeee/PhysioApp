<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: 'Segoe UI', system-ui, sans-serif; background: #fff; color: #1b1b1c; }
    .header { padding: 16px 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 10px; }
    .header-icon { width: 32px; height: 32px; background: #4f46e5; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .header-icon svg { width: 18px; height: 18px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .content { padding: 20px; }
    .status { padding: 12px 16px; border-radius: 10px; background: #f3f4f6; font-size: 13px; color: #6b7280; margin-bottom: 16px; line-height: 1.5; }
    .status.success { background: #f0fdf4; color: #166534; }
    .status.error { background: #fef2f2; color: #991b1b; }
    .status.working { background: #eef2ff; color: #3730a3; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px 16px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; min-height: 48px; background: #4f46e5; color: white; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .note { font-size: 11px; color: #9ca3af; text-align: center; padding: 12px 20px; border-top: 1px solid #f3f4f6; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    </div>
    <h1>PhysioApp Extractor</h1>
  </div>
  <div class="content">
    <div id="status" class="status">Open a NotebookLM notebook, then click Extract.</div>
    <button id="extract-btn" class="btn">Extract All Data</button>
  </div>
  <div class="note">
    Extracts flashcards, quizzes & mind maps from the current NotebookLM notebook. Downloads a ZIP file.
  </div>
  <script src="popup.js"></script>
</body>
</html>
